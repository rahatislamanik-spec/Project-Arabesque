<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="386" viewBox="0 0 1200 386" role="img" aria-labelledby="title desc">
<title id="title">Arabesque Workflow Swimlane</title>
<desc id="desc">Microsoft 365 onboarding and offboarding process across people, tools, and records</desc>
<rect width="100%" height="100%" fill="#eef3f8"/>
<rect x="30" y="30" width="1140" height="326" rx="16" fill="#ffffff" stroke="#d5deea"/>
<text x="600.0" y="78" text-anchor="middle" font-family="Segoe UI, Arial" font-size="32" font-weight="700" fill="#172033">Arabesque Workflow Swimlane</text>
<text x="600.0" y="108" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#53647c">Microsoft 365 onboarding and offboarding process across people, tools, and records</text>
<rect x="60" y="140" width="252" height="112" rx="10" fill="#2563a6" stroke="#1d4f86" stroke-width="2"/>
<text x="186.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#ffffff">Student</text>
<text x="186.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">Submits intake or receives</text>
<text x="186.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">onboarding/offboarding</text>
<text x="186.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">communication</text>
<rect x="336" y="140" width="252" height="112" rx="10" fill="#f1fbf8" stroke="#6f8fc0" stroke-width="2"/>
<text x="462.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#172033">Power Automate</text>
<text x="462.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">Triggers cloud flows and</text>
<text x="462.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">sends checklist or</text>
<text x="462.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">confirmation emails</text>
<rect x="612" y="140" width="252" height="112" rx="10" fill="#fff9e8" stroke="#6f8fc0" stroke-width="2"/>
<text x="738.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#172033">SharePoint Online</text>
<text x="738.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">Stores onboarding tracker,</text>
<text x="738.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">offboarding log, and asset</text>
<text x="738.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">inventory records</text>
<rect x="888" y="140" width="252" height="112" rx="10" fill="#fff5f4" stroke="#6f8fc0" stroke-width="2"/>
<text x="1014.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#172033">IT Team</text>
<text x="1014.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">Reviews checklist, updates</text>
<text x="1014.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">status, handles exceptions,</text>
<text x="1014.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">and closes request</text>
<rect x="60" y="308" width="1080" height="38" rx="8" fill="#172033"/>
<text x="600.0" y="333" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">Lab workflow design - no production deployment or automated Entra account creation claimed.</text>
</svg>